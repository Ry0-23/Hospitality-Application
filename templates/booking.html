{% extends "base.html" %}

{% block title %}Bookings - LuxeStay Hospitality{% endblock %}

{% block content %}
<div class="container my-5">
    <div class="row justify-content-center">
        <div class="col-md-8 col-lg-6">
            <div class="card shadow-lg border-0 rounded-4">
                <div class="card-body p-5">
                    <div class="text-center mb-4">
                        <i class="fa-solid fa-calendar-check fa-3x text-primary-custom mb-3"></i>
                        <h2 class="fw-bold">Make a Reservation</h2>
                        <p class="text-muted">Book your stay or reserve a table in just a few clicks.</p>
                    </div>

                    <form action="{{ url_for('booking') }}" method="POST">
                        <div class="mb-3">
                            <label for="name" class="form-label fw-bold">Full Name</label>
                            <input type="text" class="form-control" id="name" name="name" required placeholder="John Doe">
                        </div>
                        
                        <div class="mb-3">
                            <label for="email" class="form-label fw-bold">Email Address</label>
                            <input type="email" class="form-control" id="email" name="email" required placeholder="john@example.com">
                        </div>

                        <div class="mb-3">
                            <label for="service" class="form-label fw-bold">Service Type</label>
                            <select class="form-select" id="service" name="service" required>
                                <option value="" disabled selected>Select an option...</option>
                                <option value="Hotel Stay">Hotel Stay</option>
                                <option value="Restaurant Table">Restaurant Table</option>
                                <option value="Spa Session">Spa Session</option>
                            </select>
                        </div>

                        <div class="mb-4">
                            <label for="date" class="form-label fw-bold">Preferred Date</label>
                            <input type="date" class="form-control" id="date" name="date" required>
                        </div>

                        <button type="submit" class="btn btn-primary w-100 py-2 fs-5">Confirm Booking</button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
